<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saira'z Beauty Space</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- D3.js -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    /* minimal helpers for modal */
    .modal-overlay{
      position:fixed; inset:0; background:rgba(0,0,0,0.6);
      display:none; align-items:center; justify-content:center;
      z-index:9999;
    }
    .modal-overlay.active{ display:flex; }
    .modal-content{
      background:white; padding:24px; border-radius:16px;
      max-width:420px; width:90%;
    }
  </style>
</head>

<body class="bg-pink-50 text-gray-800">

<!-- ===================== FACIAL + MAKEUP PACKAGES ===================== -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

  <div class="bg-white rounded-2xl p-6 shadow-md">
    <h3 class="text-xl font-bold text-center mb-6">Facial Packages</h3>

    <div class="flex flex-col gap-6">

      <div><div class="flex justify-between"><b>Package 1</b><b>PKR 1,300</b></div><p>Whitening Bleach</p></div>
      <div><div class="flex justify-between"><b>Package 2</b><b>PKR 1,500</b></div><p>Normal Facial</p></div>
      <div><div class="flex justify-between"><b>Package 3</b><b>PKR 1,650</b></div><p>Acne Care</p></div>

    </div>
  </div>

</div>

<!-- ===================== GALLERY ===================== -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-10">

  <img src="https://images.unsplash.com/photo-1562322140-8baeececf3df" class="rounded-xl"/>
  <img src="https://images.unsplash.com/photo-1487412720507-e7ab37603c6f" class="rounded-xl"/>
  <img src="https://images.unsplash.com/photo-1512290923902-8a9f81dc236c" class="rounded-xl"/>

</div>

<!-- ===================== VIDEO SECTION ===================== -->
<div class="mt-10 p-6 bg-white rounded-2xl shadow">

  <iframe id="reels-iframe"
    src="https://www.instagram.com/reel/DXZaL14jKWV/embed/"
    class="w-full h-[400px] rounded-xl"></iframe>

</div>

<!-- ===================== CONTACT + FORM ===================== -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-10 mt-10">

  <!-- CONTACT -->
  <div class="bg-white p-6 rounded-2xl shadow">
    <h2 class="text-xl font-bold mb-4">Contact</h2>
    <p>Karachi, Soldier Bazar</p>
    <p>WhatsApp: 0331-2416792</p>
  </div>

  <!-- FORM -->
  <div class="bg-white p-6 rounded-2xl shadow">
    <form onsubmit="handleInquiry(event)">
      <input id="inq-name" placeholder="Name" class="border p-2 w-full mb-2"/>
      <input id="inq-email" placeholder="Email" class="border p-2 w-full mb-2"/>
      <textarea id="inq-msg" placeholder="Message" class="border p-2 w-full mb-2"></textarea>
      <button class="bg-black text-white px-4 py-2 w-full">Send</button>
    </form>
  </div>

</div>

<!-- ===================== MODALS ===================== -->
<div id="inquiry-success-modal" class="modal-overlay">
  <div class="modal-content">
    <h3 class="font-bold text-lg">Inquiry Submitted</h3>
    <p class="text-sm mt-2">Thanks <b id="modal-user-name"></b>, we will contact you at <b id="modal-user-email"></b></p>
    <button onclick="closeModal('inquiry-success-modal')" class="mt-4 bg-black text-white w-full py-2">Close</button>
  </div>
</div>

<div id="booking-success-modal" class="modal-overlay">
  <div class="modal-content">
    <h3 class="font-bold">Booking Sent</h3>
    <button onclick="closeModal('booking-success-modal')" class="mt-4 bg-black text-white w-full py-2">Close</button>
  </div>
</div>

<!-- ===================== D3 CHART ===================== -->
<div class="mt-10 bg-white p-6 rounded-2xl">
  <h2 class="font-bold mb-4">Duration Guide</h2>
  <svg id="duration-svg-canvas" class="w-full h-[400px]"></svg>
</div>

<!-- ===================== SCRIPT ===================== -->
<script>

/* ---------------- SERVICES ---------------- */
const SERVICES = {
Facials: [
{ name:'Hydra Facial', desc:'Deep skin care', price:'PKR 4500' }
],
Hair: [],
Makeup: [],
'Skin Care': [],
Nails: []
};

/* ---------------- LANDMARKS ---------------- */
const LANDMARKS = {
soldier_bazar:{
name:'Soldier Bazar',
distance:'350m',
car:'1 min',
walk:'3 min',
directions:'Straight road'
}
};

/* ---------------- D3 DATA ---------------- */
const DURATION_MATRIX = [
{category:"Bridal Makeup", duration:180, icon:"👑", intensity:"Deluxe", tip:"Full bridal setup"},
{category:"Facial", duration:90, icon:"🌸", intensity:"Care", tip:"Skin treatment"}
];

let d3SelectedItem = DURATION_MATRIX[0];

/* ---------------- INQUIRY ---------------- */
function handleInquiry(e){
e.preventDefault();

document.getElementById("modal-user-name").innerText =
document.getElementById("inq-name").value;

document.getElementById("modal-user-email").innerText =
document.getElementById("inq-email").value;

document.getElementById("inquiry-success-modal").classList.add("active");
}

/* ---------------- MODAL ---------------- */
function closeModal(id){
document.getElementById(id).classList.remove("active");
}

/* ---------------- D3 ---------------- */
function drawD3Chart(){

const svg = d3.select("#duration-svg-canvas");
svg.selectAll("*").remove();

const width = 600;
const height = 300;

const g = svg.append("g").attr("transform","translate(100,20)");

const y = d3.scaleBand()
.domain(DURATION_MATRIX.map(d=>d.category))
.range([0,height])
.padding(0.2);

const x = d3.scaleLinear()
.domain([0,200])
.range([0,width]);

g.selectAll("rect")
.data(DURATION_MATRIX)
.enter()
.append("rect")
.attr("y",d=>y(d.category))
.attr("width",d=>x(d.duration))
.attr("height",y.bandwidth())
.attr("fill","pink");

g.append("g").call(d3.axisLeft(y));
g.append("g").attr("transform",`translate(0,${height})`).call(d3.axisBottom(x));

}

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
drawD3Chart();
});

</script>

</body>
</html>
